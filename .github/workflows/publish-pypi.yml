name: Publish to PyPI

# Fires when a version tag (e.g. v0.1.0) is pushed.
on:
  push:
    tags:
      - 'v*'

# Minimal permissions — GITHUB_TOKEN can only read repo contents.
permissions:
  contents: read

jobs:
  build-and-publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Verify tag matches pyproject.toml
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION=$(python -c "import tomllib,sys;print(tomllib.loads(open('pyproject.toml','rb').read().decode()).get('project',{}).get('version',''))")
          echo "pyproject version: $VERSION, tag: $TAG"
          [[ "v$VERSION" == "$TAG" ]] || { echo "Version mismatch"; exit 1; }

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          architecture: 'arm64'

      - name: Build sdist/wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          twine upload dist/*
