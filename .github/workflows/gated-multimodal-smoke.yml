# Manual workflow: runs integration tests that download google/gemma-3n-E4B-it and train >=10 steps.
# Add repository secret HF_TOKEN (read) for the job to exercise real vision; without it, tests skip and the job stays green.
name: Gated multimodal image smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  multimodal-smoke:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          architecture: 'arm64'
          cache: 'pip'
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - name: Integration tests (gated Hub model)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          pytest tests/test_smoke_image_multimodal.py -m integration -v --tb=short
