name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'

      - name: Install project (editable) + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint (ruff)
        run: |
          ruff --version
          ruff check .
          ruff format --check .

      - name: Lightweight smoke tests
        env:
          # Avoid heavy downloads; tests should skip network-heavy paths by default
          HF_HUB_DISABLE_TELEMETRY: '1'
        run: |
          python - << 'PY'
          import platform; print('Platform:', platform.platform())
          import torch
          print('torch:', torch.__version__)
          print('MPS built:', torch.backends.mps.is_built())
          print('MPS available:', torch.backends.mps.is_available())
          PY
          
          # Run a minimal subset of tests that don't pull large models
          pytest -q tests/test_config.py tests/test_dataset_utils.py -k "not slow"

      - name: Typer CLI import
        run: |
          python - << 'PY'
          import importlib
          import core.bootstrap  # early side-effect check
          import cli_typer
          print('cli_typer import OK')
          PY
