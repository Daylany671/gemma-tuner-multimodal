name: Nightly Distributed Check

# Workflow disabled.
on: []

jobs:
  nightly-distributed-check:
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          architecture: 'arm64'

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Create localhost distributed_hosts.json
        run: |
          cat > distributed_hosts.json <<'JSON'
          {
            "master": "127.0.0.1",
            "workers": ["127.0.0.1"],
            "ssh_user": "runner",
            "python_env": "python3",
            "project_path": "$GITHUB_WORKSPACE"
          }
          JSON

      - name: Prepare SSH localhost
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -C "gh-nightly" -f ~/.ssh/id_ed25519 -N ''
          cat ~/.ssh/id_ed25519.pub >> ~/.ssh/authorized_keys
          chmod 700 ~/.ssh && chmod 600 ~/.ssh/authorized_keys
          ssh-keyscan -H 127.0.0.1 >> ~/.ssh/known_hosts
          ssh-keyscan -H localhost >> ~/.ssh/known_hosts

      - name: Run distributed-check (localhost)
        run: |
          whisper-tuner distributed-check --hosts-config distributed_hosts.json --verbose || true
