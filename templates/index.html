<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gemma · training</title>

    <script src="{{ asset_paths.socketio }}"></script>
    <script src="{{ asset_paths.threejs }}"></script>
    <script src="{{ asset_paths.chartjs }}"></script>

    <style>
        /* ---------------------------------------------------------------
           gemma training visualizer
           a window onto a model learning. black room, one warm light.
           --------------------------------------------------------------- */

        :root {
            --bg:        #000000;
            --ink:       #F5F5F0;   /* warm off-white, primary text */
            --ink-2:     #8A8A85;   /* secondary */
            --ink-3:     #3A3A38;   /* tertiary, gridlines, hairlines */
            --amber:     #FFB000;   /* the one signature color */
            --amber-dim: rgba(255, 176, 0, 0.55);
            --amber-glow:rgba(255, 176, 0, 0.08);
            --rose:      #FF4D6D;   /* reserved for danger states only */

            --sans: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                    "Helvetica Neue", system-ui, sans-serif;
            --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo,
                    Consolas, monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--ink);
            font-family: var(--sans);
            font-weight: 400;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow: hidden;
        }

        /* Tabular figures everywhere a number can change. */
        .num {
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
        }

        /* The legacy background canvas is kept (the JS still draws to it)
           but hidden — its pink/purple/blue palette belongs to the old room. */
        #particles-bg { display: none; }

        /* The legacy FPS counter is kept (the JS writes to it) but hidden.
           A serious instrument does not advertise its frame rate. */
        .fps-counter { display: none; }
        #fps-value { display: none; }

        /* ---------------------------------------------------------------
           layout — single viewport, no scroll, four bands of life
           --------------------------------------------------------------- */

        .stage {
            display: grid;
            grid-template-rows: auto auto 1fr auto;
            height: 100vh;
            padding: 28px 36px 24px;
            gap: 18px;
        }

        /* ---- band 1: wordmark + meta ---- */

        .topbar {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            border-bottom: 1px solid var(--ink-3);
            padding-bottom: 14px;
        }

        .wordmark {
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: lowercase;
            color: var(--ink-2);
        }
        .wordmark .dot {
            color: var(--amber);
            margin: 0 0.5em;
        }

        .meta {
            display: flex;
            gap: 28px;
            font-size: 12px;
            color: var(--ink-2);
            letter-spacing: 0.04em;
        }
        .meta .label {
            text-transform: lowercase;
            margin-right: 8px;
            color: var(--ink-3);
        }
        .meta .num {
            color: var(--ink);
            font-size: 12px;
        }

        /* ---- band 2: hero — the heartbeat ---- */

        .hero {
            display: grid;
            grid-template-columns: minmax(280px, 1fr) 2fr;
            gap: 36px;
            align-items: end;
            padding-top: 8px;
        }

        .heartbeat {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            min-height: 0;
        }

        .heartbeat .loss-value {
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            font-size: clamp(72px, 11vw, 168px);
            line-height: 0.92;
            letter-spacing: -0.04em;
            font-weight: 300;
            color: var(--ink);
            transition: color 220ms ease;
        }
        .heartbeat .loss-value.is-rising {
            color: var(--rose);
        }
        .heartbeat .loss-label {
            margin-top: 4px;
            font-size: 11px;
            letter-spacing: 0.18em;
            text-transform: lowercase;
            color: var(--ink-3);
        }
        .heartbeat .caption {
            margin-top: 22px;
            font-size: 22px;
            font-weight: 300;
            letter-spacing: -0.005em;
            color: var(--ink);
        }
        .heartbeat .caption .verb {
            color: var(--amber);
        }

        /* ---- the learning curve, the second protagonist ---- */

        .curve {
            position: relative;
            min-height: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .curve .curve-frame {
            position: relative;
            flex: 1;
            min-height: 0;
            border-top: 1px solid var(--ink-3);
            padding-top: 8px;
        }
        .curve canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* ---- band 3: the room — three windows + a quiet column ---- */

        .room {
            display: grid;
            grid-template-columns: 1.6fr 1fr 1fr 1fr;
            gap: 18px;
            min-height: 0;
        }

        .panel {
            position: relative;
            min-height: 0;
            display: flex;
            flex-direction: column;
            border-top: 1px solid var(--ink-3);
            padding-top: 12px;
        }

        .panel-title {
            font-size: 11px;
            letter-spacing: 0.16em;
            text-transform: lowercase;
            color: var(--ink-2);
            margin-bottom: 4px;
        }
        .panel-subtitle {
            font-size: 11px;
            color: var(--ink-3);
            margin-bottom: 12px;
            letter-spacing: 0.01em;
        }
        .panel-body {
            position: relative;
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        /* the 3D network — give it room and stillness */
        #neural-network-3d {
            position: relative;
            flex: 1;
            min-height: 0;
            cursor: grab;
        }
        #neural-network-3d:active { cursor: grabbing; }
        #neural-network-3d canvas {
            display: block;
            width: 100% !important;
            height: 100% !important;
        }

        /* attention canvas */
        #attention-heatmap { flex: 1; min-height: 0; position: relative; }
        #attention-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            image-rendering: pixelated;
            opacity: 0.92;
        }

        /* spectrogram */
        #spectrogram-canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            flex: 1;
            min-height: 0;
            image-rendering: pixelated;
            opacity: 0.92;
        }

        /* the diagnostics column (stacked) */
        .diagnostics {
            display: grid;
            grid-template-rows: 1fr 1fr 1fr;
            gap: 14px;
            min-height: 0;
        }
        .dx {
            display: flex;
            flex-direction: column;
            min-height: 0;
            border-top: 1px solid var(--ink-3);
            padding-top: 10px;
        }
        .dx .panel-title {
            margin-bottom: 6px;
        }
        .dx canvas {
            flex: 1;
            min-height: 0;
            width: 100% !important;
            height: 100% !important;
            display: block;
        }

        /* ---- band 4: tokens row — what it's about to say ---- */

        .saying {
            border-top: 1px solid var(--ink-3);
            padding-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 0;
            max-height: 110px;
        }
        .saying .panel-title { margin-bottom: 0; }
        .token-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
            align-items: baseline;
            overflow: hidden;
        }
        .token {
            font-family: var(--mono);
            font-variant-numeric: tabular-nums;
            font-feature-settings: "tnum";
            font-size: 13px;
            color: var(--ink);
            border: none;
            background: none;
            padding: 0;
            transition: opacity 240ms ease, color 240ms ease;
            animation: none;
        }
        .token::after {
            content: "·";
            color: var(--ink-3);
            margin-left: 18px;
        }
        .token:last-child::after { content: ""; }

        /* ---- ambient: a single particle from the explosion effect ---- */

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--amber);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 6px rgba(255, 176, 0, 0.6);
        }

        /* ---- the dock — quiet, lower-right ---- */

        .controls {
            position: fixed;
            bottom: 18px;
            right: 24px;
            display: flex;
            gap: 14px;
            z-index: 100;
        }
        .control-btn {
            background: none;
            border: none;
            color: var(--ink-3);
            font-family: var(--sans);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.14em;
            text-transform: lowercase;
            cursor: pointer;
            padding: 6px 4px;
            transition: color 180ms ease;
        }
        .control-btn:hover { color: var(--ink-2); }
        .control-btn.active { color: var(--amber); }
        /* The JS rewrites button innerHTML with FontAwesome <i> tags;
           we keep those silent. */
        .control-btn i { display: none; }

        /* ---- the empty room: shown until the first step lands ---- */

        .loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            z-index: 200;
            font-family: var(--sans);
            font-size: 13px;
            letter-spacing: 0.18em;
            text-transform: lowercase;
            color: var(--ink-3);
            transition: opacity 600ms ease;
        }
        .loading i { display: none; }
        .loading::before {
            content: "your machine is waking up";
            color: var(--ink-2);
            animation: breathe 2.6s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.35; }
            50%      { opacity: 0.85; }
        }

        /* ---- responsive: collapse the room on narrow screens ---- */

        @media (max-width: 1280px) {
            .room { grid-template-columns: 1.4fr 1fr 1fr; }
            .room .panel.spectrogram { display: none; }
        }
        @media (max-width: 960px) {
            .stage { padding: 20px 22px 18px; gap: 14px; }
            .hero { grid-template-columns: 1fr; gap: 18px; }
            .heartbeat .loss-value { font-size: 88px; }
            .room { grid-template-columns: 1fr 1fr; }
            .room .panel.attention { display: none; }
            .meta { gap: 16px; font-size: 11px; }
            .saying { display: none; }
        }
    </style>
</head>
<body>
    <!-- legacy canvas (hidden via CSS) -->
    <canvas id="particles-bg"></canvas>

    <!-- the empty room, shown until the first step arrives -->
    <div class="loading" id="loading"><i></i></div>

    <!-- legacy FPS counter (hidden via CSS, JS still writes to it) -->
    <div class="fps-counter">FPS: <span id="fps-value">60</span></div>

    <main class="stage">
        <!-- band 1 — wordmark + meta -->
        <header class="topbar">
            <div class="wordmark">gemma<span class="dot">·</span>training</div>
            <div class="meta">
                <div><span class="label">step</span><span class="num" id="step-count">0</span></div>
                <div><span class="label">epoch</span><span class="num" id="epoch-count">0</span></div>
                <div><span class="label">rate</span><span class="num" id="speed">0</span><span class="label" style="margin-left:6px">/s</span></div>
                <div><span class="label">device</span><span class="num" id="device-name">—</span></div>
                <div><span class="label">params</span><span class="num" id="param-count">—</span></div>
            </div>
        </header>

        <!-- band 2 — hero: heartbeat + learning curve -->
        <section class="hero">
            <div class="heartbeat">
                <div class="loss-value num" id="loss-value">—</div>
                <div class="loss-label">loss</div>
                <div class="caption">
                    Your machine is <span class="verb">learning</span>.
                </div>
            </div>
            <div class="curve">
                <div class="curve-frame">
                    <canvas id="loss-chart"></canvas>
                </div>
            </div>
        </section>

        <!-- band 3 — the room: three windows + a diagnostics column -->
        <section class="room">
            <div class="panel network">
                <div class="panel-title">inside the model</div>
                <div class="panel-subtitle">layers light up as they learn</div>
                <div class="panel-body">
                    <div id="neural-network-3d"></div>
                </div>
            </div>

            <div class="panel attention">
                <div class="panel-title">what it's looking at</div>
                <div class="panel-subtitle">attention across the input</div>
                <div class="panel-body">
                    <div id="attention-heatmap">
                        <canvas id="attention-canvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="panel spectrogram">
                <div class="panel-title">listening</div>
                <div class="panel-subtitle">audio it's processing right now</div>
                <div class="panel-body">
                    <canvas id="spectrogram-canvas"></canvas>
                </div>
            </div>

            <div class="diagnostics">
                <div class="dx">
                    <div class="panel-title">signal strength</div>
                    <canvas id="gradient-chart"></canvas>
                </div>
                <div class="dx">
                    <div class="panel-title">step size</div>
                    <canvas id="lr-chart"></canvas>
                </div>
                <div class="dx">
                    <div class="panel-title">memory</div>
                    <canvas id="memory-chart"></canvas>
                </div>
            </div>
        </section>

        <!-- band 4 — what it's about to say -->
        <section class="saying">
            <div class="panel-title">what it's about to say</div>
            <div class="token-cloud" id="token-cloud"></div>
        </section>
    </main>

    <!-- the dock -->
    <div class="controls">
        <button class="control-btn" id="pause-btn"><i></i>pause</button>
        <button class="control-btn" id="sound-btn"><i></i>sound</button>
        <button class="control-btn" id="fullscreen-btn"><i></i>fullscreen</button>
        <button class="control-btn" id="toggle-3d"><i></i>model</button>
        <button class="control-btn" id="toggle-attn"><i></i>attention</button>
        <button class="control-btn" id="toggle-tokens"><i></i>tokens</button>
        <button class="control-btn" id="toggle-spec"><i></i>audio</button>
    </div>

    <!-- a tiny bridge: keep the giant loss number in sync with whatever
         the existing visualizer.js stream emits, without touching its
         internals. listens to the same socket events, updates the hero. -->
    <script>
    (function () {
        var lossEl = document.getElementById('loss-value');
        var lastLoss = null;

        function fmt(n) {
            if (n === null || n === undefined || isNaN(n)) return '—';
            if (n >= 100) return n.toFixed(1);
            if (n >= 10)  return n.toFixed(2);
            return n.toFixed(3);
        }

        function setLoss(n) {
            if (n === null || n === undefined || isNaN(n)) return;
            lossEl.textContent = fmt(n);
            // brief rose flash if loss is rising — the only time the rose color
            // is allowed to appear in the chrome.
            if (lastLoss !== null && n > lastLoss * 1.02) {
                lossEl.classList.add('is-rising');
                setTimeout(function () { lossEl.classList.remove('is-rising'); }, 600);
            }
            lastLoss = n;
        }

        // Wait for io to exist (loaded from socketio script tag) and then
        // attach our own listener. visualizer.js attaches its own listeners
        // to the same events; both will fire.
        function attach() {
            if (typeof io !== 'function') {
                return setTimeout(attach, 50);
            }
            // Reuse the same socket connection — io() returns a singleton
            // for the default namespace.
            var s = io();
            s.on('training_update', function (data) {
                if (data && typeof data.loss === 'number') setLoss(data.loss);
            });
            s.on('history_data', function (data) {
                if (data && Array.isArray(data.loss_history) && data.loss_history.length) {
                    setLoss(data.loss_history[data.loss_history.length - 1]);
                }
            });
        }
        attach();
    })();
    </script>

    <script src="/static/visualizer.js?v=4"></script>
</body>
</html>
